<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Page wrapper ─────────────────────────────────────────── -->
  <div class="page">

    <!-- ─── Card ─────────────────────────────────────────────────── -->
    <div class="card">

      <!-- Title -->
      <h1 class="title">Sprouts</h1>

      <!-- ─── Controls bar ──────────────────────────────────────── -->
      <div class="controls">

        <!-- Dropdown: how many starting dots? -->
        <label class="control-label" for="dot-count">Starting dots</label>
        <select id="dot-count" class="select">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>

        <!-- Start button -->
        <button id="start-btn" class="btn-primary">Start Game</button>

        <!--
          Create Move button.
          Hidden by default via the btn--hidden class.
          UI.syncCreateMoveButton() shows it when both endpoints are selected.
        -->
        <button id="create-move-btn" class="btn-secondary btn--hidden">
          Create Move
        </button>

      </div>
      <!-- /controls -->

      <!-- ─── Status message ────────────────────────────────────── -->
      <!--
        Text is set exclusively by UI.setStatus() — never hardcoded here.
      -->
      <p id="status" class="status"></p>
      <!-- /status -->

      <!-- ─── Board ─────────────────────────────────────────────── -->
      <svg
        id="board"
        class="board"
        width="700"
        height="500"
        viewBox="0 0 700 500"
        xmlns="http://www.w3.org/2000/svg"
      >
        <!-- Dots will be injected here by renderer.js -->
      </svg>
      <!-- /board -->

      <!-- ─── Debug: move list ──────────────────────────────────── -->
      <!--
        v0.5: a plain-text log of committed Move objects.
        Populated by UI.renderMoveList() after each move is committed.
        Will be removed or replaced when a proper game log is designed.
      -->
      <section class="move-list-section">
        <h2 class="move-list-section__title">Moves</h2>
        <div id="move-list">
          <!-- Move items injected by ui.js -->
        </div>
      </section>
      <!-- /move-list -->

    </div>
    <!-- /card -->

  </div>
  <!-- /page -->

  <!--
    Single module entry point. ES module imports resolve the full
    dependency graph automatically — no additional script tags needed.

    Load order (via imports):
      app.js → ui.js → boardView.js, selectionState.js, renderer.js
                      → engine/engine.js → engine/reducer.js
                      → engine/move.js
                      → models.js
  -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
