<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Page wrapper ─────────────────────────────────────────── -->
  <div class="page">

    <!-- ─── Card ─────────────────────────────────────────────────── -->
    <div class="card">

      <!-- Title -->
      <h1 class="title">Sprouts</h1>

      <!-- ─── Controls bar ──────────────────────────────────────── -->
      <div class="controls">

        <!-- Dropdown: how many starting dots? -->
        <label class="control-label" for="dot-count">Starting dots</label>
        <select id="dot-count" class="select">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>

        <!-- Start button -->
        <button id="start-btn" class="btn-primary">Start Game</button>

        <!-- Turn indicator. data-player set by ui.js; CSS colours it. -->
        <div id="turn-indicator" class="turn-indicator"></div>

      </div>
      <!-- /controls -->

      <!-- ─── Status message ────────────────────────────────────── -->
      <!--
        Text is set exclusively by UI.setStatus() — never hardcoded here.
      -->
      <p id="status" class="status"></p>
      <!-- /status -->

      <!-- ─── Board ─────────────────────────────────────────────── -->
      <svg
        id="board"
        class="board"
        width="700"
        height="500"
        viewBox="0 0 700 500"
        xmlns="http://www.w3.org/2000/svg"
      >
        <!-- Dots and drawn curves are injected here by renderer.js -->
      </svg>
      <!-- /board -->

      <!-- ─── Debug: move list ──────────────────────────────────── -->
      <!--
        Debug log of committed moves.
        Populated by UI.renderMoveList() after each move is committed.
      -->
      <section class="move-list-section">
        <h2 class="move-list-section__title">Moves</h2>
        <div id="move-list">
          <!-- Move items injected by ui.js -->
        </div>
      </section>
      <!-- /move-list -->

      <!-- ─── Game Record: export / import ───────────────────────── -->
      <!--
        Minimal copy/paste UI over engine/gameRecord.js.
        Export reads the live engine state and displays its Game
        Record JSON for the player to copy. Import reads pasted JSON,
        replays it through the real engine (Engine.apply — the same
        function ordinary play uses), and on success rebuilds the
        board via UI.loadImportedGame(). All wiring lives in
        gameRecordUI.js, kept separate from ui.js.
      -->
      <section class="game-record-section">
        <h2 class="game-record-section__title">Game Record</h2>

        <div class="game-record-block">
          <label class="control-label" for="export-output">Export</label>
          <textarea
            id="export-output"
            class="game-record-textarea"
            readonly
            placeholder="Click Export to show this game's record here."
          ></textarea>
          <button id="export-btn" class="btn-secondary">Export</button>
        </div>

        <div class="game-record-block">
          <label class="control-label" for="import-input">Import</label>
          <textarea
            id="import-input"
            class="game-record-textarea"
            placeholder="Paste a game record JSON here."
          ></textarea>
          <button id="import-btn" class="btn-secondary">Import</button>
          <p id="import-status" class="game-record-status"></p>
        </div>
      </section>
      <!-- /game-record -->

    </div>
    <!-- /card -->

  </div>
  <!-- /page -->

  <!--
    Single module entry point. ES module imports resolve the full
    dependency graph automatically.

    Module graph (via imports):
      app.js → ui.js → drawInteraction.js → pathSimplify.js
                      → drawInteraction.js → crossingDetection.js
                      → drawInteraction.js → constants.js
                      → boardView.js, selectionState.js
                      → renderer.js → constants.js
                      → engine/engine.js → engine/reducer.js
                      → engine/move.js, engine/rules.js, engine/regions.js
                      → models.js
      app.js → gameRecordUI.js → engine/engine.js
                                → engine/gameRecord.js → engine/engine.js
                                → ui.js (loadImportedGame)
  -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
